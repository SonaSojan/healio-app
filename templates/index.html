<!DOCTYPE html>
<html>
<head>
  <title>Healio User</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="logo">💙 Healio</div>
  <div class="userid">👤 {{ user_id }}</div>
</div>

<!-- FORM CARD -->
<div class="card main-card">

  <h2>📨 Report Symptoms & Send Message</h2>

  <form method="POST">

    <label>Describe your symptoms</label>
    <textarea name="symptoms" placeholder="e.g., headache, nausea, anxiety..." required></textarea>

    <label>Additional message (optional)</label>
    <textarea name="message" placeholder="Any additional information you'd like to share..."></textarea>

    <button class="btn-primary">Submit Report</button>

  </form>

</div>

<!-- CHAT -->
<div class="card chat-card">

  <h2>Communication History</h2>

  <div class="chat-box">

    {% for msg in messages %}
      {% if msg.user_id == user_id %}

        <!-- USER MESSAGE -->
        <div class="chat user">
          <div class="bubble user-bubble">
            <strong>You</strong><br>
            {{ msg.message }}
          </div>
        </div>

        <!-- DOCTOR MESSAGE -->
        {% if msg.reply %}
        <div class="chat doctor">
          <div class="bubble doctor-bubble">
            <strong>Doctor</strong><br>
            {{ msg.reply }}
          </div>
        </div>
        {% endif %}

      {% endif %}
    {% endfor %}

  </div>

</div>

</body>
</html>
